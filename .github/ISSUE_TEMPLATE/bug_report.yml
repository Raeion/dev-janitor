name: Bug report
description: Report a bug in Dev Janitor
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `dj scan .`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Dev Janitor version
      placeholder: Run `dj --version`
  - type: input
    id: platform
    attributes:
      label: OS and Node.js version
      placeholder: e.g. Windows 11, Node 22
