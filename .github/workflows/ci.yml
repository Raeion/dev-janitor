name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage
      - run: npm audit --audit-level=high

  docker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test -- tests/docker-cleaner.test.ts

  git-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test -- tests/git-cleaner.test.ts

  # Single required status check for branch protection / rulesets.
  ci:
    name: CI
    if: always()
    needs: [lint-build-test, coverage, docker-tests, git-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs to succeed
        run: |
          results='${{ join(needs.*.result, ',') }}'
          echo "Job results: $results"
          if [[ "$results" == *"failure"* || "$results" == *"cancelled"* || "$results" == *"skipped"* ]]; then
            echo "One or more required jobs did not succeed."
            exit 1
          fi
